<svg xmlns="http://www.w3.org/2000/svg" width="420" height="72" viewBox="0 0 420 72">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2b2b2b"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="420" height="72" rx="14" fill="url(#bg)"/>
  <!-- Linux / Tux penguin simplified icon (FCC624 yellow) -->
  <!-- Body -->
  <ellipse cx="46" cy="42" rx="14" ry="17" fill="#FCC624"/>
  <!-- Head -->
  <ellipse cx="46" cy="24" rx="10" ry="11" fill="#FCC624"/>
  <!-- Eyes -->
  <ellipse cx="42" cy="21" rx="2.5" ry="3" fill="#1a1a1a"/>
  <ellipse cx="50" cy="21" rx="2.5" ry="3" fill="#1a1a1a"/>
  <!-- Beak -->
  <ellipse cx="46" cy="28" rx="4" ry="2.5" fill="#E8900A"/>
  <!-- Belly (white) -->
  <ellipse cx="46" cy="43" rx="9" ry="12" fill="white"/>
  <!-- Divider -->
  <line x1="80" y1="16" x2="80" y2="56" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Label -->
  <text x="172" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="1">DOWNLOAD FOR</text>
  <text x="172" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">Linux</text>
  <!-- File format pill -->
  <rect x="254" y="22" width="88" height="28" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="298" y="41" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" font-weight="600" fill="rgba(255,255,255,0.75)" text-anchor="middle">.AppImage</text>
  <!-- Download arrow -->
  <text x="387" y="44" font-family="system-ui" font-size="26" fill="rgba(255,255,255,0.8)" text-anchor="middle">⬇</text>
</svg>
