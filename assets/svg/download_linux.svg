<svg xmlns="http://www.w3.org/2000/svg" width="420" height="68" viewBox="0 0 420 68">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#232323"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="68" rx="12" fill="url(#bg)"/>

  <!-- ── Tux penguin ── centered at x=40 y=34 in a ~62×62 area ── -->

  <!-- Body (black oval) -->
  <ellipse cx="40" cy="43" rx="15" ry="18" fill="#111111"/>

  <!-- Head (black circle) -->
  <circle cx="40" cy="18" r="13" fill="#111111"/>

  <!-- White belly -->
  <ellipse cx="40" cy="44" rx="9.5" ry="13" fill="white"/>

  <!-- White face patch -->
  <ellipse cx="40" cy="19" rx="8" ry="8.5" fill="white"/>

  <!-- Left eye -->
  <circle cx="36.2" cy="15.5" r="2.6" fill="#222"/>
  <circle cx="35.5" cy="14.8" r="0.9" fill="white"/>

  <!-- Right eye -->
  <circle cx="43.8" cy="15.5" r="2.6" fill="#222"/>
  <circle cx="43.1" cy="14.8" r="0.9" fill="white"/>

  <!-- Beak -->
  <path d="M37.2 23.5 L42.8 23.5 L40 28.5 Z" fill="#F4A923"/>

  <!-- Left wing -->
  <ellipse cx="25.5" cy="42" rx="5" ry="12" fill="#111111" transform="rotate(-10 25.5 42)"/>

  <!-- Right wing -->
  <ellipse cx="54.5" cy="42" rx="5" ry="12" fill="#111111" transform="rotate(10 54.5 42)"/>

  <!-- Left foot -->
  <path d="M30 59 Q26 62 22 61 L23 64 Q28 65 33 61 Z" fill="#F4A923"/>

  <!-- Right foot -->
  <path d="M50 59 Q54 62 58 61 L57 64 Q52 65 47 61 Z" fill="#F4A923"/>

  <!-- ── Divider ── -->
  <line x1="80" y1="14" x2="80" y2="54" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- "DOWNLOAD FOR" label -->
  <text x="200" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="1.5">DOWNLOAD FOR</text>

  <!-- Platform name -->
  <text x="200" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-0.3">Linux</text>

  <!-- Format pill -->
  <rect x="296" y="20" width="82" height="26" rx="6" fill="rgba(255,255,255,0.09)"/>
  <text x="337" y="37" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">.AppImage</text>

  <!-- Download arrow (SVG path) -->
  <g transform="translate(393 23)">
    <path fill="rgba(255,255,255,0.75)" d="M11 4a1 1 0 0 0-2 0v8.586L6.707 10.293a1 1 0 1 0-1.414 1.414l4 4a1 1 0 0 0 1.414 0l4-4a1 1 0 0 0-1.414-1.414L11 12.586V4zM4 18a1 1 0 0 0 0 2h12a1 1 0 0 0 0-2H4z"/>
  </g>
</svg>
