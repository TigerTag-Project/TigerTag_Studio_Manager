<svg xmlns="http://www.w3.org/2000/svg" width="420" height="72" viewBox="0 0 420 72">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <clipPath id="r">
      <rect width="420" height="72" rx="14"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="420" height="72" rx="14" fill="url(#bg)"/>
  <!-- Apple logo -->
  <text x="46" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="white" text-anchor="middle"></text>
  <!-- Divider -->
  <line x1="80" y1="16" x2="80" y2="56" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Label -->
  <text x="172" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="1">DOWNLOAD FOR</text>
  <text x="172" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">macOS</text>
  <!-- File format pill -->
  <rect x="270" y="22" width="62" height="28" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="301" y="41" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="600" fill="rgba(255,255,255,0.75)" text-anchor="middle">.dmg</text>
  <!-- Download arrow -->
  <text x="387" y="44" font-family="system-ui" font-size="26" fill="rgba(255,255,255,0.8)" text-anchor="middle">⬇</text>
</svg>
